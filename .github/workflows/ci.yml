# CI workflow (language-aware).
#
# Runs:
#   - pre-commit hooks (same checks devs run locally)
#   - Python: pytest + coverage + bandit (if pyproject.toml present)
#   - JS/TS: vitest or npm test (if package.json present)
#   - Rust: cargo test (if Cargo.toml present)
#
# Note: hashFiles() is NOT supported at the job-level `if:` (only at step level).
# Language gating uses a `detect` job that exposes outputs via test -f.
#
# Triggered on push and PR. Free GitHub Actions usage.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.check.outputs.python }}
      js: ${{ steps.check.outputs.js }}
      rust: ${{ steps.check.outputs.rust }}
    steps:
      - uses: actions/checkout@v7
      - id: check
        run: |
          if [ -f pyproject.toml ] || [ -f requirements.txt ]; then
            echo "python=true" >> "$GITHUB_OUTPUT"
          else
            echo "python=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f package.json ]; then
            echo "js=true" >> "$GITHUB_OUTPUT"
          else
            echo "js=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f Cargo.toml ]; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust=false" >> "$GITHUB_OUTPUT"
          fi

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14.6"
      - uses: actions/setup-node@v7
        with:
          node-version: "24.18.0"
      # JS/TS repos: install node deps so the eslint pre-commit hook
      # (`npx --no-install eslint`) can resolve a locally-installed eslint.
      # Gated on package.json so Python/Rust-only repos skip it. npm ci is
      # used for a clean, lockfile-pinned install; falls back to npm install
      # if the lockfile is out of sync.
      - name: Install node deps (JS/TS lint hooks)
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
          fi
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure
        continue-on-error: false

  python:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install 3.12
      - name: Install deps
        run: |
          if [ -f pyproject.toml ]; then
            uv sync --all-extras || pip install -e .
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pytest pytest-cov bandit pip-audit
      - name: Run pytest
        run: |
          if [ -d tests ] || [ -d test ]; then
            pytest --cov --cov-report=xml || echo "No tests collected"
          else
            echo "No tests directory — skipping pytest"
          fi
      - name: Run bandit (Python security scan)
        run: bandit -r . -x ./tests,./test,./.venv,./venv,./node_modules -ll || true
        continue-on-error: true
      - name: Run pip-audit (dependency CVE scan)
        run: pip-audit --strict || true
        continue-on-error: true

  js:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.js == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24.18.0"
          cache: "npm"
      - name: Install deps
        run: |
          if [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm && pnpm install
          elif [ -f bun.lockb ] || [ -f bun.lock ]; then
            npm install -g bun && bun install
          else
            npm install
          fi
      - name: Run tests
        run: npm test --if-present
      - name: Run npm audit
        run: npm audit --audit-level=high || true
        continue-on-error: true

  rust:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all-features
      - run: cargo clippy --all-targets -- -D warnings

  dependency-scan:
    runs-on: ubuntu-latest
    # OSV-Scanner (Google) scans lockfiles against the OSV.dev vulnerability DB.
    # Replaces dependency-review-action, which requires GitHub Advanced Security
    # (Dependency Graph + Code Security). GHAS is unavailable on many orgs and on
    # private repos, where dependency-review red-X's every PR.
    # OSV-Scanner is free and runs on ANY repo — public, private, any org — with no
    # GHAS dependency. We use the COMPOSITE action (not the reusable PR workflow):
    # the reusable workflow uploads SARIF to the Security tab, which on private repos
    # is itself a GHAS feature and would hit the same wall. The composite action runs
    # the scanner in-container, prints findings to the job log, and fails the job on
    # any known vuln. Keep a working check everywhere; don't skip.
    # NOTE: scans the whole lockfile and fails on any severity — stricter than the old
    # fail-on-severity:high diff gate. Add a .osv-scanner.toml allowlist for false
    # positives. Docs: https://google.github.io/osv-scanner/github-action/
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --recursive
            ./
